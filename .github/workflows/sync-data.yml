name: Sync OpenSincera Data

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Fetch ecosystem data
        run: |
          mkdir -p data
          curl -s -H "Authorization: Bearer ${{ secrets.OPENSINCERA_API_KEY }}" \
               -H "Content-Type: application/json" \
               "https://open.sincera.io/api/ecosystem" \
               -o data/ecosystem.json

      - name: Fetch publisher data
        run: |
          echo '{}' > data/publishers.json
          # Publisher domains to sync
          DOMAINS="zone.msn.com microsoftcasualgames.com msn.com arkadium.com"
          for domain in $DOMAINS; do
            echo "Fetching $domain..."
            curl -s -H "Authorization: Bearer ${{ secrets.OPENSINCERA_API_KEY }}" \
                 -H "Content-Type: application/json" \
                 "https://open.sincera.io/api/publishers?domain=$domain" \
                 -o /tmp/pub.json

            python3 -c "
import json
with open('data/publishers.json') as f:
    publishers = json.load(f)
with open('/tmp/pub.json') as f:
    data = json.load(f)
publishers['$domain'] = data
if data.get('publisher_id'):
    publishers[str(data['publisher_id'])] = data
with open('data/publishers.json', 'w') as f:
    json.dump(publishers, f)
"
            sleep 0.3
          done
          echo "Done fetching publishers"

      - name: Create metadata
        run: |
          python3 -c "
          import json
          from datetime import datetime, timezone
          meta = {
              'lastUpdated': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'source': 'OpenSincera API'
          }
          with open('data/publishers.json') as f:
              meta['publisherCount'] = len(json.load(f))
          with open('data/metadata.json', 'w') as f:
              json.dump(meta, f, indent=2)
          "

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "chore: daily data sync $(date -u +%Y-%m-%d)"
            git push
          fi
